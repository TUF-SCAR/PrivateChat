name: Discord Repo Activity

on:
  push:
  pull_request:
    types: [opened, reopened, synchronize, closed, ready_for_review]
  issues:
    types: [opened, edited, closed, reopened, assigned, unassigned, labeled, unlabeled]
  issue_comment:
    types: [created, edited, deleted]
  create:
  delete:
  workflow_dispatch:
    inputs:
      backfill_commits:
        description: "How many recent commits to send now"
        required: false
        default: "0"

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  notify-discord:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          CREW_ROLE_ID: ${{ secrets.CREW_ROLE_ID }}
          EVENT_NAME: ${{ github.event_name }}
          ACTOR: ${{ github.actor }}
          REPOSITORY: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
          REF: ${{ github.ref }}
          SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          BACKFILL_COMMITS: ${{ github.event.inputs.backfill_commits || '0' }}
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess
          import time
          import urllib.request
          import urllib.error
          from datetime import datetime, timezone

          webhook_url = os.environ["DISCORD_WEBHOOK_URL"].strip()
          role_id = os.environ.get("CREW_ROLE_ID", "").strip()

          event_name = os.environ["EVENT_NAME"]
          actor = os.environ["ACTOR"]
          repo = os.environ["REPOSITORY"]
          ref_name = os.environ["REF_NAME"]
          ref = os.environ["REF"]
          sha = os.environ["SHA"]
          run_url = os.environ["RUN_URL"]

          try:
              backfill_commits = int(os.environ.get("BACKFILL_COMMITS") or "0")
          except ValueError:
              backfill_commits = 0

          event_path = os.environ["GITHUB_EVENT_PATH"]
          with open(event_path, "r", encoding="utf-8") as file:
              event = json.load(file)

          now_dt = datetime.now(timezone.utc)
          now = now_dt.strftime("%Y-%m-%d %H:%M:%S UTC")
          now_unix = int(now_dt.timestamp())

          def short_sha(value):
              return value[:7] if value else "unknown"

          def discord_time(unix_timestamp):
              return f"<t:{unix_timestamp}:R>"

          def parse_github_time_to_unix(value):
              if not value:
                  return now_unix

              try:
                  fixed_value = value.replace("Z", "+00:00")
                  return int(datetime.fromisoformat(fixed_value).timestamp())
              except Exception:
                  return now_unix

          def send_to_discord(message):
              prefix = f"<@&{role_id}> " if role_id else ""

              payload = {
                  "content": prefix + message,
                  "allowed_mentions": {
                      "parse": [],
                      "roles": [role_id] if role_id else []
                  }
              }

              data = json.dumps(payload).encode("utf-8")

              request = urllib.request.Request(
                  webhook_url,
                  data=data,
                  headers={
                      "Content-Type": "application/json",
                      "User-Agent": "GitHub-Actions-Discord-Webhook"
                  },
                  method="POST",
              )

              try:
                  with urllib.request.urlopen(request) as response:
                      print("Discord response:", response.status)
              except urllib.error.HTTPError as error:
                  print("Discord HTTP error:", error.code)
                  print(error.read().decode("utf-8"))
                  raise

          def build_push_messages():
              commits = event.get("commits", [])
              compare_url = event.get("compare", "")
              pusher = event.get("pusher", {}).get("name", actor)

              messages = []

              if len(commits) == 0:
                  messages.append("\n".join([
                      "**GitHub Push**",
                      f"**Repo:** `{repo}`",
                      f"**Branch:** `{ref_name}`",
                      f"**By:** `{pusher}` / GitHub actor `{actor}`",
                      f"**Time:** `{now}` {discord_time(now_unix)}",
                      "**Commits:** `0`",
                      f"Compare: {compare_url}" if compare_url else "",
                      f"Run: {run_url}",
                  ]))
                  return messages

              for commit in commits:
                  full_sha = commit.get("id", "")
                  commit_id = short_sha(full_sha)
                  message_title = commit.get("message", "").splitlines()[0]
                  author = commit.get("author", {}).get("name", "unknown")
                  timestamp = commit.get("timestamp", "")
                  commit_unix = parse_github_time_to_unix(timestamp)
                  url = commit.get("url", "")

                  lines = [
                      "**GitHub Push Commit**",
                      f"**Repo:** `{repo}`",
                      f"**Branch:** `{ref_name}`",
                      f"**Pushed by:** `{pusher}` / GitHub actor `{actor}`",
                      f"**Commit by:** `{author}`",
                      f"**Time:** `{timestamp}` {discord_time(commit_unix)}",
                      "",
                      f"- `{commit_id}` **{message_title}**",
                  ]

                  if url:
                      lines.append(f"  {url}")

                  if compare_url:
                      lines.append(f"Compare: {compare_url}")

                  lines.append(f"Run: {run_url}")

                  messages.append("\n".join(lines))

              return messages

          def build_pull_request_message():
              pr = event.get("pull_request", {})
              action = event.get("action", "unknown")
              title = pr.get("title", "No title")
              number = pr.get("number", "unknown")
              url = pr.get("html_url", "")
              from_branch = pr.get("head", {}).get("ref", "unknown")
              to_branch = pr.get("base", {}).get("ref", "unknown")
              user = pr.get("user", {}).get("login", actor)
              created_at = pr.get("updated_at") or pr.get("created_at")
              event_unix = parse_github_time_to_unix(created_at)

              return "\n".join([
                  f"**GitHub Pull Request `{action}`**",
                  f"**Repo:** `{repo}`",
                  f"**PR:** `#{number}` {title}",
                  f"**By:** `{user}`",
                  f"**Branch:** `{from_branch}` → `{to_branch}`",
                  f"**Time:** `{created_at or now}` {discord_time(event_unix)}",
                  url,
                  f"Run: {run_url}",
              ])

          def build_issue_message():
              issue = event.get("issue", {})
              action = event.get("action", "unknown")
              title = issue.get("title", "No title")
              number = issue.get("number", "unknown")
              url = issue.get("html_url", "")
              user = issue.get("user", {}).get("login", actor)
              created_at = issue.get("updated_at") or issue.get("created_at")
              event_unix = parse_github_time_to_unix(created_at)

              return "\n".join([
                  f"**GitHub Issue `{action}`**",
                  f"**Repo:** `{repo}`",
                  f"**Issue:** `#{number}` {title}",
                  f"**By:** `{user}`",
                  f"**Time:** `{created_at or now}` {discord_time(event_unix)}",
                  url,
                  f"Run: {run_url}",
              ])

          def build_issue_comment_message():
              action = event.get("action", "unknown")
              issue = event.get("issue", {})
              comment = event.get("comment", {})
              number = issue.get("number", "unknown")
              title = issue.get("title", "No title")
              url = comment.get("html_url", issue.get("html_url", ""))
              user = comment.get("user", {}).get("login", actor)
              created_at = comment.get("updated_at") or comment.get("created_at")
              event_unix = parse_github_time_to_unix(created_at)

              body = comment.get("body", "").replace("\n", " ")
              if len(body) > 300:
                  body = body[:300] + "..."

              return "\n".join([
                  f"**GitHub Issue Comment `{action}`**",
                  f"**Repo:** `{repo}`",
                  f"**Issue/PR:** `#{number}` {title}",
                  f"**By:** `{user}`",
                  f"**Comment:** {body}",
                  f"**Time:** `{created_at or now}` {discord_time(event_unix)}",
                  url,
                  f"Run: {run_url}",
              ])

          def build_create_delete_message():
              action = "created" if event_name == "create" else "deleted"
              ref_type = event.get("ref_type", "unknown")
              event_ref = event.get("ref", ref_name)

              return "\n".join([
                  f"**GitHub Ref `{action}`**",
                  f"**Repo:** `{repo}`",
                  f"**Type:** `{ref_type}`",
                  f"**Name:** `{event_ref}`",
                  f"**By:** `{actor}`",
                  f"**Time:** `{now}` {discord_time(now_unix)}",
                  f"Run: {run_url}",
              ])

          def build_backfill_messages():
              output = subprocess.check_output(
                  [
                      "git",
                      "log",
                      f"-n{backfill_commits}",
                      "--pretty=format:%H%x1f%an%x1f%ai%x1f%ct%x1f%s"
                  ],
                  text=True,
                  encoding="utf-8"
              )

              messages = []

              if output.strip() == "":
                  messages.append("\n".join([
                      "**Manual Backfill: No commit(s) found**",
                      f"**Repo:** `{repo}`",
                      f"**Branch:** `{ref_name}`",
                      f"**Triggered by:** `{actor}`",
                      f"**Time:** `{now}` {discord_time(now_unix)}",
                      f"Run: {run_url}",
                  ]))
                  return messages

              for line in output.splitlines():
                  full_sha, author, commit_time, commit_unix, subject = line.split("\x1f", 4)
                  commit_url = f"https://github.com/{repo}/commit/{full_sha}"

                  message = "\n".join([
                      "**Manual Backfill Commit**",
                      f"**Repo:** `{repo}`",
                      f"**Branch:** `{ref_name}`",
                      f"**Triggered by:** `{actor}`",
                      f"**Commit by:** `{author}`",
                      f"**Time:** `{commit_time}` {discord_time(commit_unix)}",
                      "",
                      f"- `{short_sha(full_sha)}` **{subject}**",
                      f"  {commit_url}",
                      f"Run: {run_url}",
                  ])

                  messages.append(message)

              return messages

          if event_name == "workflow_dispatch" and backfill_commits > 0:
              messages = build_backfill_messages()
          elif event_name == "push":
              messages = build_push_messages()
          elif event_name == "pull_request":
              messages = [build_pull_request_message()]
          elif event_name == "issues":
              messages = [build_issue_message()]
          elif event_name == "issue_comment":
              messages = [build_issue_comment_message()]
          elif event_name in ["create", "delete"]:
              messages = [build_create_delete_message()]
          else:
              messages = ["\n".join([
                  f"**GitHub Event:** `{event_name}`",
                  f"**Repo:** `{repo}`",
                  f"**Branch/ref:** `{ref}`",
                  f"**By:** `{actor}`",
                  f"**Commit:** `{short_sha(sha)}`",
                  f"**Time:** `{now}` {discord_time(now_unix)}",
                  f"Run: {run_url}",
              ])]

          for message in messages:
              if len(message) > 1900:
                  message = message[:1900] + "\n\nMessage trimmed because it was too long."

              send_to_discord(message)
              time.sleep(1)
          PY
