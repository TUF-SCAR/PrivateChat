name: Discord Repo Activity

on:
  push:
  pull_request:
    types: [opened, reopened, synchronize, closed, ready_for_review]
  issues:
    types: [opened, edited, closed, reopened, assigned, unassigned, labeled, unlabeled]
  issue_comment:
    types: [created, edited, deleted]
  create:
  delete:
  workflow_dispatch:
    inputs:
      backfill_commits:
        description: "How many recent commits to send now"
        required: false
        default: "0"

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  notify-discord:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          CREW_ROLE_ID: ${{ secrets.CREW_ROLE_ID }}
          EVENT_NAME: ${{ github.event_name }}
          ACTOR: ${{ github.actor }}
          REPOSITORY: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
          REF: ${{ github.ref }}
          SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          BACKFILL_COMMITS: ${{ github.event.inputs.backfill_commits || '0' }}
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess
          import time
          import urllib.request
          import urllib.error
          from datetime import datetime, timezone

          webhook_url = os.environ["DISCORD_WEBHOOK_URL"].strip()
          role_id = os.environ.get("CREW_ROLE_ID", "").strip()

          event_name = os.environ["EVENT_NAME"]
          actor = os.environ["ACTOR"]
          repo = os.environ["REPOSITORY"]
          ref_name = os.environ["REF_NAME"]
          ref = os.environ["REF"]
          sha = os.environ["SHA"]
          run_url = os.environ["RUN_URL"]

          try:
              backfill_commits = int(os.environ.get("BACKFILL_COMMITS") or "0")
          except ValueError:
              backfill_commits = 0

          event_path = os.environ["GITHUB_EVENT_PATH"]
          with open(event_path, "r", encoding="utf-8") as file:
              event = json.load(file)

          now_dt = datetime.now(timezone.utc)
          now = now_dt.strftime("%Y-%m-%d %H:%M:%S UTC")
          now_unix = int(now_dt.timestamp())

          BLUE = 5814783
          GREEN = 5763719
          ORANGE = 16753920
          RED = 15548997
          PURPLE = 10181046
          GRAY = 9807270

          def short_sha(value):
              return value[:7] if value else "unknown"

          def discord_time(unix_timestamp):
              return f"<t:{unix_timestamp}:R>"

          def safe_value(value, fallback="unknown"):
              if value is None:
                  return fallback
              value = str(value).strip()
              return value if value else fallback

          def first_line(value):
              return safe_value(value).splitlines()[0]

          def parse_github_time_to_unix(value):
              if not value:
                  return now_unix

              try:
                  fixed_value = value.replace("Z", "+00:00")
                  return int(datetime.fromisoformat(fixed_value).timestamp())
              except Exception:
                  return now_unix

          def make_embed(title, description, color, url=None, fields=None, footer=None, timestamp=None):
              embed = {
                  "title": title,
                  "description": description,
                  "color": color,
                  "fields": fields or [],
                  "timestamp": timestamp or datetime.now(timezone.utc).isoformat(),
              }

              if url:
                  embed["url"] = url

              if footer:
                  embed["footer"] = {"text": footer}

              return embed

          def send_to_discord(embed):
              content = f"<@&{role_id}>" if role_id else ""

              payload = {
                  "content": content,
                  "embeds": [embed],
                  "flags": 4,
                  "allowed_mentions": {
                      "parse": [],
                      "roles": [role_id] if role_id else []
                  }
              }

              data = json.dumps(payload).encode("utf-8")

              request = urllib.request.Request(
                  webhook_url,
                  data=data,
                  headers={
                      "Content-Type": "application/json",
                      "User-Agent": "GitHub-Actions-Discord-Webhook"
                  },
                  method="POST",
              )

              try:
                  with urllib.request.urlopen(request) as response:
                      print("Discord response:", response.status)
              except urllib.error.HTTPError as error:
                  print("Discord HTTP error:", error.code)
                  print(error.read().decode("utf-8"))
                  raise

          def workflow_field():
              return {
                  "name": "Workflow",
                  "value": f"[Open workflow run]({run_url})",
                  "inline": False
              }

          def build_commit_embed(title, full_sha, subject, commit_url, branch, commit_author, pusher, commit_time, commit_unix, extra_footer):
              description = f"`{short_sha(full_sha)}` **{safe_value(subject)}**"

              fields = [
                  {
                      "name": "Repository",
                      "value": f"`{repo}`",
                      "inline": False
                  },
                  {
                      "name": "Branch",
                      "value": f"`{safe_value(branch)}`",
                      "inline": True
                  },
                  {
                      "name": "Commit by",
                      "value": f"`{safe_value(commit_author)}`",
                      "inline": True
                  },
                  {
                      "name": "Triggered by",
                      "value": f"`{safe_value(pusher)}`",
                      "inline": True
                  },
                  {
                      "name": "Commit",
                      "value": f"`{short_sha(full_sha)}`",
                      "inline": True
                  },
                  {
                      "name": "Time",
                      "value": f"`{safe_value(commit_time)}`\n{discord_time(commit_unix)}",
                      "inline": False
                  },
                  workflow_field(),
              ]

              return make_embed(
                  title=title,
                  description=description,
                  color=GREEN,
                  url=commit_url,
                  fields=fields,
                  footer=extra_footer,
              )

          def build_push_embeds():
              commits = event.get("commits", [])
              pusher = event.get("pusher", {}).get("name", actor)

              embeds = []

              if len(commits) == 0:
                  embeds.append(make_embed(
                      title="GitHub Push",
                      description="Push event received, but no commit data was included.",
                      color=BLUE,
                      fields=[
                          {"name": "Repository", "value": f"`{repo}`", "inline": False},
                          {"name": "Branch", "value": f"`{ref_name}`", "inline": True},
                          {"name": "Pushed by", "value": f"`{pusher}`", "inline": True},
                          {"name": "Time", "value": f"`{now}`\n{discord_time(now_unix)}", "inline": False},
                          workflow_field(),
                      ],
                      footer=f"GitHub actor: {actor}"
                  ))
                  return embeds

              for commit in commits:
                  full_sha = safe_value(commit.get("id", ""), "")
                  subject = first_line(commit.get("message", "No commit message"))
                  author = commit.get("author", {}).get("name", "unknown")
                  timestamp = commit.get("timestamp", "")
                  commit_unix = parse_github_time_to_unix(timestamp)
                  commit_url = commit.get("url", "")

                  embeds.append(build_commit_embed(
                      title="GitHub Push Commit",
                      full_sha=full_sha,
                      subject=subject,
                      commit_url=commit_url,
                      branch=ref_name,
                      commit_author=author,
                      pusher=pusher,
                      commit_time=timestamp,
                      commit_unix=commit_unix,
                      extra_footer=f"Push event • GitHub actor: {actor}",
                  ))

              return embeds

          def build_pull_request_embed():
              pr = event.get("pull_request", {})
              action = event.get("action", "unknown")
              title = pr.get("title", "No title")
              number = pr.get("number", "unknown")
              url = pr.get("html_url", "")
              from_branch = pr.get("head", {}).get("ref", "unknown")
              to_branch = pr.get("base", {}).get("ref", "unknown")
              user = pr.get("user", {}).get("login", actor)
              state = pr.get("state", "unknown")
              merged = pr.get("merged", False)
              changed_files = pr.get("changed_files", "unknown")
              additions = pr.get("additions", "unknown")
              deletions = pr.get("deletions", "unknown")
              updated_at = pr.get("updated_at") or pr.get("created_at")
              event_unix = parse_github_time_to_unix(updated_at)

              status_text = f"`{state}`"
              if merged:
                  status_text += " / `merged`"

              return make_embed(
                  title=f"Pull Request {action}",
                  description=f"`#{number}` **{title}**",
                  color=PURPLE,
                  url=url,
                  fields=[
                      {"name": "Repository", "value": f"`{repo}`", "inline": False},
                      {"name": "By", "value": f"`{user}`", "inline": True},
                      {"name": "Status", "value": status_text, "inline": True},
                      {"name": "From", "value": f"`{from_branch}`", "inline": True},
                      {"name": "To", "value": f"`{to_branch}`", "inline": True},
                      {"name": "Files changed", "value": f"`{changed_files}`", "inline": True},
                      {"name": "Changes", "value": f"`+{additions}` / `-{deletions}`", "inline": True},
                      {"name": "Time", "value": f"`{safe_value(updated_at, now)}`\n{discord_time(event_unix)}", "inline": False},
                      workflow_field(),
                  ],
                  footer=f"GitHub actor: {actor}"
              )

          def build_issue_embed():
              issue = event.get("issue", {})
              action = event.get("action", "unknown")
              title = issue.get("title", "No title")
              number = issue.get("number", "unknown")
              url = issue.get("html_url", "")
              user = issue.get("user", {}).get("login", actor)
              state = issue.get("state", "unknown")
              comments = issue.get("comments", "unknown")
              updated_at = issue.get("updated_at") or issue.get("created_at")
              event_unix = parse_github_time_to_unix(updated_at)

              return make_embed(
                  title=f"Issue {action}",
                  description=f"`#{number}` **{title}**",
                  color=ORANGE,
                  url=url,
                  fields=[
                      {"name": "Repository", "value": f"`{repo}`", "inline": False},
                      {"name": "By", "value": f"`{user}`", "inline": True},
                      {"name": "State", "value": f"`{state}`", "inline": True},
                      {"name": "Comments", "value": f"`{comments}`", "inline": True},
                      {"name": "Time", "value": f"`{safe_value(updated_at, now)}`\n{discord_time(event_unix)}", "inline": False},
                      workflow_field(),
                  ],
                  footer=f"GitHub actor: {actor}"
              )

          def build_issue_comment_embed():
              action = event.get("action", "unknown")
              issue = event.get("issue", {})
              comment = event.get("comment", {})
              number = issue.get("number", "unknown")
              title = issue.get("title", "No title")
              url = comment.get("html_url", issue.get("html_url", ""))
              user = comment.get("user", {}).get("login", actor)
              updated_at = comment.get("updated_at") or comment.get("created_at")
              event_unix = parse_github_time_to_unix(updated_at)

              body = comment.get("body", "").replace("\n", " ")
              if len(body) > 500:
                  body = body[:500] + "..."

              return make_embed(
                  title=f"Issue Comment {action}",
                  description=f"`#{number}` **{title}**",
                  color=BLUE,
                  url=url,
                  fields=[
                      {"name": "Repository", "value": f"`{repo}`", "inline": False},
                      {"name": "By", "value": f"`{user}`", "inline": True},
                      {"name": "Comment", "value": safe_value(body, "No comment body"), "inline": False},
                      {"name": "Time", "value": f"`{safe_value(updated_at, now)}`\n{discord_time(event_unix)}", "inline": False},
                      workflow_field(),
                  ],
                  footer=f"GitHub actor: {actor}"
              )

          def build_create_delete_embed():
              action = "created" if event_name == "create" else "deleted"
              ref_type = event.get("ref_type", "unknown")
              event_ref = event.get("ref", ref_name)
              color = GREEN if event_name == "create" else RED

              return make_embed(
                  title=f"GitHub Ref {action}",
                  description=f"`{ref_type}` **{event_ref}**",
                  color=color,
                  fields=[
                      {"name": "Repository", "value": f"`{repo}`", "inline": False},
                      {"name": "Type", "value": f"`{ref_type}`", "inline": True},
                      {"name": "Name", "value": f"`{event_ref}`", "inline": True},
                      {"name": "By", "value": f"`{actor}`", "inline": True},
                      {"name": "Time", "value": f"`{now}`\n{discord_time(now_unix)}", "inline": False},
                      workflow_field(),
                  ],
                  footer=f"GitHub actor: {actor}"
              )

          def build_backfill_embeds():
              output = subprocess.check_output(
                  [
                      "git",
                      "log",
                      f"-n{backfill_commits}",
                      "--reverse",
                      "--pretty=format:%H%x1f%an%x1f%ai%x1f%ct%x1f%s"
                  ],
                  text=True,
                  encoding="utf-8"
              )

              embeds = []

              if output.strip() == "":
                  embeds.append(make_embed(
                      title="Manual Backfill",
                      description="No commits found for this branch/range.",
                      color=GRAY,
                      fields=[
                          {"name": "Repository", "value": f"`{repo}`", "inline": False},
                          {"name": "Branch", "value": f"`{ref_name}`", "inline": True},
                          {"name": "Requested commits", "value": f"`{backfill_commits}`", "inline": True},
                          {"name": "Triggered by", "value": f"`{actor}`", "inline": True},
                          {"name": "Time", "value": f"`{now}`\n{discord_time(now_unix)}", "inline": False},
                          workflow_field(),
                      ],
                      footer="Manual workflow dispatch"
                  ))
                  return embeds

              for line in output.splitlines():
                  full_sha, author, commit_time, commit_unix, subject = line.split("\x1f", 4)
                  commit_url = f"https://github.com/{repo}/commit/{full_sha}"

                  fields = [
                      {
                          "name": "Repository",
                          "value": f"`{repo}`",
                          "inline": False
                      },
                      {
                          "name": "Branch",
                          "value": f"`{ref_name}`",
                          "inline": True
                      },
                      {
                          "name": "Commit by",
                          "value": f"`{safe_value(author)}`",
                          "inline": True
                      },
                      {
                          "name": "Triggered by",
                          "value": f"`{actor}`",
                          "inline": True
                      },
                      {
                          "name": "Commit",
                          "value": f"`{short_sha(full_sha)}`",
                          "inline": True
                      },
                      {
                          "name": "Time",
                          "value": f"`{commit_time}`\n{discord_time(commit_unix)}",
                          "inline": False
                      },
                      workflow_field(),
                  ]

                  embeds.append(make_embed(
                      title="Manual Backfill Commit",
                      description=f"`{short_sha(full_sha)}` **{safe_value(subject)}**",
                      color=GREEN,
                      url=commit_url,
                      fields=fields,
                      footer="Oldest selected commit sent first"
                  ))

              return embeds

          if event_name == "workflow_dispatch" and backfill_commits > 0:
              embeds = build_backfill_embeds()
          elif event_name == "push":
              embeds = build_push_embeds()
          elif event_name == "pull_request":
              embeds = [build_pull_request_embed()]
          elif event_name == "issues":
              embeds = [build_issue_embed()]
          elif event_name == "issue_comment":
              embeds = [build_issue_comment_embed()]
          elif event_name in ["create", "delete"]:
              embeds = [build_create_delete_embed()]
          else:
              embeds = [make_embed(
                  title=f"GitHub Event: {event_name}",
                  description=f"`{short_sha(sha)}` event received.",
                  color=GRAY,
                  fields=[
                      {"name": "Repository", "value": f"`{repo}`", "inline": False},
                      {"name": "Branch/ref", "value": f"`{ref}`", "inline": False},
                      {"name": "By", "value": f"`{actor}`", "inline": True},
                      {"name": "Time", "value": f"`{now}`\n{discord_time(now_unix)}", "inline": False},
                      workflow_field(),
                  ],
                  footer=f"GitHub actor: {actor}"
              )]

          for embed in embeds:
              send_to_discord(embed)
              time.sleep(1)
          PY
